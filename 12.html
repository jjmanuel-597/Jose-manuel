<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<div class="layout-grid">
    <header class="header">Cabecera</header>
    <aside class="sidebar">Menú Lateral</aside>
    <main class="content">Contenido Principal</main>
    <footer class="footer">Footer</footer>
</div>
<body>
    <style>
        .layout-grid {
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: 80px auto 60px;
    grid-template-areas: 
        "header header"
        "sidebar content"
        "footer footer";
    gap: 10px;
    height: 100vh;
    font-family: sans-serif;
    color: white;
}
/* Asignación de áreas */
.header  { grid-area: header; background-color: #1abc9c; }
.sidebar { grid-area: sidebar; background-color: #34495e; }
.content { grid-area: content; background-color: #ecf0f1; color: #333; }
.footer  { grid-area: footer; background-color: #2c3e50; }

.layout-grid > * {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
    </style>

</body>
</html>
