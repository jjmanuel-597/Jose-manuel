 Aplica el mismo color a los títulos h2, h3 y h4 sin repetir código.
Requerimientos: Agrupa selectores con comas (h2, h3, h4).
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        h2, h3, h4 {
            color: #3498db;
        }
    </style>
</head>
<body>
    <h1>Mi Documento de Prueba</h1>
    <h2>Título H2</h2>
    <h3>Título H3</h3>
    <h4>Título H4</h4>
    <p>Este es un párrafo normal.</p>
    <p>Este es otro párrafo normal.</p>
    <p>Este es un tercer párrafo normal.</p>
</body>
</html>
