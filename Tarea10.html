 Cambia el aspecto de un botón al pasarle el mouse por encima.
Requerimientos: Implementa la pseudo-clase :hover. Cambia el color de fondo y usa cursor: pointer.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        .boton {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .boton:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h1>Mi Documento de Prueba</h1>
    <p>Este es un párrafo normal.</p>
    <p>Este es otro párrafo normal.</p>
    <p>Este es un tercer párrafo normal.</p>
    <button class="boton">Haz clic aquí</button>
</body>
</html>
