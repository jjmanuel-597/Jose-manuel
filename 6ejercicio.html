<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Acordeón - Checkbox Hack</title>
	<style>
		:root{--bg:#f7f9fb;--card:#ffffff;--accent:#2563eb;--text:#0f172a}
		body{margin:0;min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
		.container{width:100%;max-width:760px;padding:24px}
		.accordion{background:var(--card);border-radius:10px;box-shadow:0 8px 24px rgba(9,30,66,0.08);overflow:hidden}
		.item{border-top:1px solid rgba(15,23,42,.06)}
		.item:first-child{border-top:0}
		/* Checkbox hack - escondemos el checkbox visualmente */
		.item input{position:absolute;opacity:0;height:0;width:0}

		.label{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;color:var(--text);font-weight:600}
		.label .chev{transition:transform .3s ease}

		.content{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;background:linear-gradient(180deg,rgba(0,0,0,0.02),transparent)}
		.content p{margin:12px 0;color:#374151}

		/* Selector: cuando el checkbox está chequeado, seleccionamos el hermano .content usando ~ y :checked */
		.item input:checked ~ .content{max-height:240px;padding:12px 18px}
		.item input:checked ~ .label .chev{transform:rotate(180deg)}

		/* Pequeños estilos de accesibilidad */
		.label:focus{outline:2px solid rgba(37,99,235,.18);outline-offset:2px}
	</style>
</head>
<body>
	<div class="container">
		<h2 style="margin:0 0 12px">Acordeón (Checkbox Hack)</h2>
		<div class="accordion">

			<div class="item">
				<input type="checkbox" id="acc1">
				<label class="label" for="acc1">Sección 1 <span class="chev">▾</span></label>
				<div class="content">
					<p>Contenido de la sección 1. Aquí puedes poner texto, imágenes o lo que necesites.</p>
				</div>
			</div>

			<div class="item">
				<input type="checkbox" id="acc2">
				<label class="label" for="acc2">Sección 2 <span class="chev">▾</span></label>
				<div class="content">
					<p>Contenido de la sección 2. El checkbox controla la apertura sin JavaScript.</p>
				</div>
			</div>

			<div class="item">
				<input type="checkbox" id="acc3">
				<label class="label" for="acc3">Sección 3 <span class="chev">▾</span></label>
				<div class="content">
					<p>Contenido de la sección 3. Usa el selector <code>input:checked ~ .content</code> para mostrarlo.</p>
				</div>
			</div>

		</div>
	</div>
</body>
</html>
