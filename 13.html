<body>
    <style>
        .menu-principal {
    list-style: none;

}
.dropdown-item {
    position: relative;
    display: inline-block;
}
/* Submenú oculto por defecto */
.submenu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background-color: white;
    list-style: none;
    padding: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
/* Se muestra al hacer hover en el padre */
.dropdown-item:hover .submenu {
    display: block;
}
    </style>
