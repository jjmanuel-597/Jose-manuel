 Separa el texto del borde de un botón para que respire.
Requerimientos: Emplea la propiedad abreviada padding.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        .boton {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head><body>
    <h1>Mi Documento de Prueba</h1>
    <p>Este es un párrafo normal.</p>
    <p>Este es otro párrafo normal.</p> 
    <button class="boton">Haz clic en mí</button>
</body>
</html>
