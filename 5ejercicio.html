<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Tema automático (prefers-color-scheme)</title>
	<style>
		:root{
			--bg: #ffffff;
			--text: #111827;
			--card: #ffffff;
			--accent: #2563eb;
			--muted: #6b7280;
		}

		@media (prefers-color-scheme: dark){
			:root{
				--bg: #0b1220;
				--text: #e6eef8;
				--card: #071029;
				--accent: #60a5fa;
				--muted: #9ca3af;
			}
		}

		*{box-sizing:border-box}
		body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;transition:background .25s,color .25s}
		.wrap{width:100%;max-width:900px;padding:32px}
		.card{background:var(--card);padding:24px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.08);text-align:center}
		h1{margin:0 0 8px;font-size:1.25rem}
		p{margin:.25rem 0;color:var(--muted)}
		.btn{margin-top:12px;background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<h1>Tema automático</h1>
			<p>Esta página cambia de color según la preferencia del sistema.</p>
			<p class="note">Prueba activando el modo oscuro en tu sistema operativo para verlo en acción.</p>
			<button class="btn">Botón de ejemplo</button>
		</div>
	</div>
</body>
</html>
