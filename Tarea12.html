 Dale un efecto de tarjeta elevada 3D a un contenedor.
Requerimientos: Usa box-shadow configurando X, Y, desenfoque y color.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        .tarjeta {
            width: 300px;
            height: 200px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1>Mi Documento de Prueba</h1>
    <div class="tarjeta">
        Tarjeta Elevada
    </div>
</body>
</html>
