<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Indicador de carga CSS</title>
	<style>
		:root{--accent:#2b6cb0}
		html,body{height:100%;margin:0}
		body{display:flex;align-items:center;justify-content:center;background:#f3f4f6;font-family:system-ui,Segoe UI,Roboto,Arial}

		/* Loader: un solo div y dos pseudo-elementos */
		.loader{
			width:12px;
			height:12px;
			background:var(--accent);
			border-radius:50%;
			position:relative;
			display:inline-block;
			/* animación aplicada al elemento y sus pseudo-elementos */
			animation: bounce 0.7s ease-in-out infinite;
		}
		.loader::before,
		.loader::after{
			content:"";
			width:12px;
			height:12px;
			background:var(--accent);
			border-radius:50%;
			position:absolute;
			top:0;
			/* heredan la animación; aplicamos delays distintos para crear efecto en ola */
			animation: bounce 0.7s ease-in-out infinite;
		}
		.loader::before{ left:-20px; animation-delay:0.08s }
		.loader::after{ left:20px;  animation-delay:0.16s }

		@keyframes bounce{
			0%, 80%, 100%{ transform: translateY(0) }
			40%{ transform: translateY(-12px) }
		}

		/* Accesibilidad: texto oculto para lectores */
		.sr-only{ position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0 }
	</style>
</head>
<body>
	<div role="status">
		<div class="loader" aria-hidden="true"></div>
		<span class="sr-only">Cargando…</span>
	</div>
</body>
</html>
