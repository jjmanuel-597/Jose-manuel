<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo de Búsqueda con Sugerencias</title>
</head>
<body>
    <h1>Campo de Búsqueda</h1>

    <label for="busqueda">Buscar:</label>
    <input type="search" id="busqueda" name="busqueda" list="sugerencias" placeholder="Escribe tu búsqueda...">
    
    <datalist id="sugerencias">
        <option value="Opción 1">
        <option value="Opción 2">
        <option value="Opción 3">
        <option value="Opción 4">
        <option value="Opción 5">
    </datalist>
</body>
</html>
