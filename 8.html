<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<div class="user-card">
    <img src="https://picsum.photos/150" alt="Foto de perfil">
    <h3>Alex Silva</h3>
    <p>Desarrollador Frontend</p>
    <button>Seguir</button>
</div>
<body>
<style>
    .user-card {
    width: 250px;
    padding: 20px;
    text-align: center;
    background: white;
    border-radius: 12px;
    font-family: sans-serif;
    /* Sombra elegante */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    margin: 20px;
}
.user-card img {
    width: 100px;
    height: 100px;
    border-radius: 50%; /* Imagen redonda */
    object-fit: cover; /* Evita que se deforme */
    margin-bottom: 15px;
}
.user-card button {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</body>
</html>
