 Centra y pon en mayúsculas tu título principal.
Requerimientos: Crea el ID #titulo-principal. Emplea text-align y text-transform.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        #titulo-principal {
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1 id="titulo-principal">Mi Documento de Prueba</h1>
    <p>Este es un párrafo normal.</p>
    <p>Este es otro párrafo normal.</p>
    <p>Este es un tercer párrafo normal.</p>
</body>
</html>
