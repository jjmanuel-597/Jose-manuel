 Que tu página se adapte a celulares. Si la pantalla es pequeña, convierte una fila en columna.
Requerimientos: Usa @media (max-width: 768px) y cambia el flex-direction a column.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }
        .box {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
            flex: 1;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* Cambia a columna en pantallas pequeñas */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Caja 1</div>
        <div class="box">Caja 2</div>
        <div class="box">Caja 3</div>
    </div>
</body>
</html>
