 Centra un contenedor div horizontalmente.
Requerimientos: Asigna un width fijo y utiliza margin: 0 auto.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        .contenedor {
            width: 300px;
            margin: 0 auto;
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mi Documento de Prueba</h1>
    <p>Este es un párrafo normal.</p>
    <p>Este es otro párrafo normal.</p>
    <p>Este es un tercer párrafo normal.</p>
    <div class="contenedor">
        Este contenedor está centrado horizontalmente.
    </div>
</body>
</html>
