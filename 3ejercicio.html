<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Tarjeta 3D - Ejercicio</title>
	<style>
		body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5;font-family:Arial,Helvetica,sans-serif}
		.scene{width:320px;height:200px;perspective:1000px}
		.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .8s}
		.scene:hover .card,.scene:focus-within .card{transform:rotateY(180deg)}
		.card__face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem;backface-visibility:hidden}
		.card__front{background:linear-gradient(135deg,#667eea,#764ba2)}
		.card__back{background:linear-gradient(135deg,#ff7e5f,#feb47b);transform:rotateY(180deg)}
	</style>
</head>
<body>
	<div class="scene" tabindex="0" aria-label="Tarjeta que gira en 3D">
		<div class="card">
			<div class="card__face card__front">Frente</div>
			<div class="card__face card__back">Reverso</div>
		</div>
	</div>
</body>
</html>
