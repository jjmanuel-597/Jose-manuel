 Enmarca una imagen con un recuadro visible.
Requerimientos: Aplica border-width, border-style y border-color.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        .imagen-con-recuadro {
            border-width: 2px;
            border-style: solid;
            border-color: black;
        }
    </style>
</head>
<body>
    <h1>Mi Documento de Prueba</h1>
    <p>Este es un párrafo normal.</p>
    <p>Este es otro párrafo normal.</p>
    <p>Este es un tercer párrafo normal.</p>
    <img src="https://pixabay.com/es/images/download/wo-jian-qing-shan-duo-wu-mei-dog-7694676_1920.jpg" alt="Descripción de la imagen" class="imagen-con-recuadro">
</body>
</html>
