 Haz que el efecto hover del botón no sea agresivo, que cambie suavemente.
Requerimientos: Aplica transition en el botón normal, especificando duración (ej. 0.5s).
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botón con Efecto Hover Suave</title>
    <style>
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background-color 0.5s; /* Transición suave */
        }
        button:hover {
            background-color: #45a049; /* Color de fondo al hacer hover */
        }
    </style>
</head>
<body>
    <button>Hover Me</button>
</body>
</html>
