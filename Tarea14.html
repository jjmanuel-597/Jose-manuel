 Centra un texto de forma PERFECTA en medio de la pantalla (horizontal y vertical).
Requerimientos: Contenedor con height: 100vh, display: flex, align-items: center y justify-content: center.
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea de Prueba</title>
    <style>
        .contenedor {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
        }
        .texto {
            font-size: 2em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="texto">Texto Centrado</div>
    </div>
</body>
</html>
