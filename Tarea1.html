 Cambia el color de fondo de la página web y el color del texto de los h1.
Requerimientos: Usa selector de etiqueta body y h1. Aplica background-color y color.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea 1</title>
    <style>
        body {
            background-color: lightblue; /* Cambia el color de fondo de la página */
        }
        h1 {
            color: darkblue; /* Cambia el color del texto de los h1 */
        }
    </style>
</head>
<body>
    <h1>¡Hola, Mundo!</h1>
    <p>Esta es una página de prueba para cambiar el color de fondo y el color del texto de los h1.</p>
</body>
</html>
